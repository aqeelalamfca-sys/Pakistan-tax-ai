name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build API Server
        run: pnpm --filter @workspace/api-server run build
      - name: Build Frontend
        run: pnpm --filter @workspace/tax-engine run build
        env:
          BASE_PATH: /
          PORT: 3000

  docker-build:
    name: Docker Build
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.api
          push: false
          tags: pakistan-tax-ai-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.frontend
          push: false
          tags: pakistan-tax-ai-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
