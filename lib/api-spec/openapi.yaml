openapi: 3.1.0
info:
  title: Api
  version: 1.0.0
  description: Tax Intelligence Engine API - Pakistan-focused AI Tax Software
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and authorization
  - name: firms
    description: Firm management
  - name: users
    description: User management
  - name: clients
    description: Client onboarding and management
  - name: engagements
    description: Engagement workflow
  - name: uploads
    description: Document upload center
  - name: validation
    description: Validation engine
  - name: mapping
    description: Account mapping engine
  - name: rules
    description: Tax rule engine
  - name: computation
    description: Tax computation workspace
  - name: withholding
    description: Withholding tax review
  - name: risks
    description: Risk register
  - name: reviews
    description: Review notes and approval workflow
  - name: ai
    description: AI drafting assistant
  - name: reports
    description: Reporting and exports
  - name: audit
    description: Audit logs
  - name: vault
    description: Super Admin Knowledge Vault

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /auth/mfa/setup:
    post:
      operationId: setupMfa
      tags: [auth]
      summary: Setup MFA for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: MFA setup data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaSetupResponse"

  /auth/mfa/verify:
    post:
      operationId: verifyMfa
      tags: [auth]
      summary: Verify MFA token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaVerifyRequest"
      responses:
        "200":
          description: MFA verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients for current firm
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Clients list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientListResponse"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get client by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update client
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientRequest"
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Soft delete client
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /engagements:
    get:
      operationId: listEngagements
      tags: [engagements]
      summary: List engagements
      security:
        - bearerAuth: []
      parameters:
        - name: clientId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Engagements list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngagementListResponse"
    post:
      operationId: createEngagement
      tags: [engagements]
      summary: Create a new engagement
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEngagementRequest"
      responses:
        "201":
          description: Engagement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"

  /engagements/{id}:
    get:
      operationId: getEngagement
      tags: [engagements]
      summary: Get engagement by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Engagement details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"
    put:
      operationId: updateEngagement
      tags: [engagements]
      summary: Update engagement
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEngagementRequest"
      responses:
        "200":
          description: Engagement updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"

  /engagements/{id}/status:
    patch:
      operationId: updateEngagementStatus
      tags: [engagements]
      summary: Update engagement status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdateRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Engagement"

  /uploads:
    get:
      operationId: listUploads
      tags: [uploads]
      summary: List uploads for an engagement
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Uploads list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadListResponse"
    post:
      operationId: createUpload
      tags: [uploads]
      summary: Upload a document
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadRequest"
      responses:
        "201":
          description: Upload created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Upload"

  /uploads/{id}:
    get:
      operationId: getUpload
      tags: [uploads]
      summary: Get upload status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upload details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Upload"

  /validation/{engagementId}:
    get:
      operationId: getValidationResults
      tags: [validation]
      summary: Get validation results for engagement
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Validation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResultsResponse"
    post:
      operationId: runValidation
      tags: [validation]
      summary: Run validation for engagement
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Validation triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /mapping/{engagementId}:
    get:
      operationId: getMappings
      tags: [mapping]
      summary: Get account mappings for engagement
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Mappings list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MappingListResponse"
    post:
      operationId: saveMapping
      tags: [mapping]
      summary: Save or update account mapping
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveMappingRequest"
      responses:
        "200":
          description: Mapping saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountMapping"

  /rules:
    get:
      operationId: listRules
      tags: [rules]
      summary: List tax rules
      security:
        - bearerAuth: []
      parameters:
        - name: taxType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Rules list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleListResponse"
    post:
      operationId: createRule
      tags: [rules]
      summary: Create a new tax rule
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRuleRequest"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxRule"

  /rules/{engagementId}/run:
    post:
      operationId: runRules
      tags: [rules]
      summary: Run all rules for an engagement
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rules executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleRunResponse"

  /computation/{engagementId}:
    get:
      operationId: getComputation
      tags: [computation]
      summary: Get tax computation for engagement
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Computation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxComputation"
    post:
      operationId: saveComputation
      tags: [computation]
      summary: Save tax computation
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveComputationRequest"
      responses:
        "200":
          description: Computation saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxComputation"

  /computation/{engagementId}/lock:
    post:
      operationId: lockComputation
      tags: [computation]
      summary: Lock computation (Partner only)
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Computation locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /computation/{engagementId}/unlock:
    post:
      operationId: unlockComputation
      tags: [computation]
      summary: Unlock computation (Partner only)
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnlockRequest"
      responses:
        "200":
          description: Computation unlocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /withholding/{engagementId}:
    get:
      operationId: getWithholdingEntries
      tags: [withholding]
      summary: Get withholding entries for engagement
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Withholding entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithholdingResponse"

  /risks/{engagementId}:
    get:
      operationId: listRisks
      tags: [risks]
      summary: Get risk register for engagement
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: string
        - name: severity
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Risk register
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskListResponse"

  /risks/{id}/status:
    patch:
      operationId: updateRiskStatus
      tags: [risks]
      summary: Update risk status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskStatusUpdate"
      responses:
        "200":
          description: Risk updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskFlag"

  /reviews/{engagementId}/notes:
    get:
      operationId: listReviewNotes
      tags: [reviews]
      summary: Get review notes for engagement
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Review notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewNoteListResponse"
    post:
      operationId: createReviewNote
      tags: [reviews]
      summary: Create review note
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewNoteRequest"
      responses:
        "201":
          description: Review note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewNote"

  /reviews/{engagementId}/approve:
    post:
      operationId: approveEngagement
      tags: [reviews]
      summary: Approve engagement (Partner only)
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalRequest"
      responses:
        "200":
          description: Engagement approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"

  /ai/generate:
    post:
      operationId: generateAiOutput
      tags: [ai]
      summary: Generate AI drafted output
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiGenerateRequest"
      responses:
        "200":
          description: AI output generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiOutput"

  /ai/outputs/{id}/promote:
    post:
      operationId: promoteAiOutput
      tags: [ai]
      summary: Promote AI output to review note (explicit human action required)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI output promoted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /reports/{engagementId}/export:
    post:
      operationId: exportReport
      tags: [reports]
      summary: Export report pack (locked snapshots only)
      security:
        - bearerAuth: []
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportRequest"
      responses:
        "200":
          description: Export triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResponse"

  /audit:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit logs
      security:
        - bearerAuth: []
      parameters:
        - name: firmId
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: module
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"

  /vault/documents:
    get:
      operationId: listVaultDocuments
      tags: [vault]
      summary: List knowledge vault documents (Super Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: taxType
          in: query
          schema:
            type: string
        - name: docType
          in: query
          schema:
            type: string
        - name: jurisdiction
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Vault documents list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultDocumentListResponse"
    post:
      operationId: uploadVaultDocument
      tags: [vault]
      summary: Upload document to knowledge vault (Super Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/VaultUploadRequest"
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultDocument"

  /vault/documents/{id}:
    get:
      operationId: getVaultDocument
      tags: [vault]
      summary: Get vault document details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vault document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultDocument"
    put:
      operationId: updateVaultDocument
      tags: [vault]
      summary: Update vault document metadata (Super Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVaultDocumentRequest"
      responses:
        "200":
          description: Document updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultDocument"
    delete:
      operationId: deleteVaultDocument
      tags: [vault]
      summary: Delete vault document (Super Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /vault/documents/{id}/activate:
    patch:
      operationId: activateVaultDocument
      tags: [vault]
      summary: Activate vault document (Super Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultDocument"

  /vault/documents/{id}/deactivate:
    patch:
      operationId: deactivateVaultDocument
      tags: [vault]
      summary: Deactivate vault document (Super Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultDocument"

  /vault/documents/{id}/versions:
    get:
      operationId: getVaultDocumentVersions
      tags: [vault]
      summary: Get version history for a vault document
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Version history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultVersionListResponse"

  /vault/search:
    post:
      operationId: searchVault
      tags: [vault]
      summary: Search vault documents for AI retrieval
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VaultSearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultSearchResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users for current firm
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

